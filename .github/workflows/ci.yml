name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install OpenSpec
        run: npm install -g @fission-ai/openspec@1.2.0

      - name: Run tests
        run: npm test

      - name: Validate OpenDomain
        run: npm run opendomain -- validate

      - name: Validate OpenSpec
        run: npm run openspec:validate
